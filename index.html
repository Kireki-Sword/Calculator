<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div id="calculator">
        <div id="display"></div>
        <div id="btnCon">
            <div id="yellow">
                <button id="+" class="btn btnYellow"> + </button>
                <button id="-" class="btn btnYellow"> - </button>
                <button id="*" class="btn btnYellow"> * </button>
                <button id="/" class="btn btnYellow"> / </button>
                <button id="C" class="btn btnYellow"> C </button>
            </div>
            <div id="black">
                <button id="7" class="btn btnBlack"> 7 </button>
                <button id="8" class="btn btnBlack"> 8 </button>
                <button id="9" class="btn btnBlack"> 9 </button>
                <button id="4" class="btn btnBlack"> 4 </button>
                <button id="5" class="btn btnBlack"> 5 </button>
                <button id="6" class="btn btnBlack"> 6 </button>
                <button id="1" class="btn btnBlack"> 1 </button>
                <button id="2" class="btn btnBlack"> 2 </button>
                <button id="3" class="btn btnBlack"> 3 </button>
                <button id="0" class="btn btnBlack"> 0 </button>
                <button id="." class="btn btnBlack"> . </button>
                <button id="=" class="btn btnBlack"> = </button>
            </div>
            
        </div>


    </div>

    
</body>
</html>
