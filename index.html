<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <h1>Final</h1>
    <div id="calculator">
        <input id="display" readonly></input>
        <div id="btnCon">
            <button onclick="appendToDisplay('+')" class="btn btnYellow">+</button>
            <button onclick="appendToDisplay('7')" class="btn btnBlack">7</button>
            <button onclick="appendToDisplay('8')" class="btn btnBlack">8</button>
            <button onclick="appendToDisplay('9')" class="btn btnBlack">9</button>

            <button onclick="appendToDisplay('-')" class="btn btnYellow">-</button>
            <button onclick="appendToDisplay('4')" class="btn btnBlack">4</button>
            <button onclick="appendToDisplay('5')" class="btn btnBlack">5</button>
            <button onclick="appendToDisplay('6')" class="btn btnBlack">6</button>

            <button onclick="appendToDisplay('*')" class="btn btnYellow">*</button>
            <button onclick="appendToDisplay('1')" class="btn btnBlack">1</button>
            <button onclick="appendToDisplay('2')" class="btn btnBlack">2</button>
            <button onclick="appendToDisplay('3')" class="btn btnBlack">3</button>

            <button onclick="appendToDisplay('/')" class="btn btnYellow">/</button>
            <button onclick="appendToDisplay('0')" class="btn btnBlack">0</button>
            <button onclick="appendToDisplay('.')" class="btn btnBlack">.</button>
            <button onclick="calculate()" class="btn btnBlack">=</button>

            <button onclick="clearDisplay()" class="btn btnYellow">C</button>
        </div>


    </div>

    
</body>
</html>
